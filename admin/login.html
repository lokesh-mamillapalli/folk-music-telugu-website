<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | Telugu Folk Songs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@400;600;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="../index.html">Telugu Folk Songs</a>
      <nav class="nav-links">
        <a href="../index.html">Home</a>
        <a href="../songs/index.html">Songs</a>
        <a href="../artists/index.html">Artists</a>
        <a href="login.html" aria-current="page">Admin</a>
      </nav>
    </div>
  </header>

  <main class="container page-content admin-wrap">
    <section class="card admin-card">
      <h1>Admin Login</h1>
      <p class="muted">Only authorized admin can manage songs and metadata.</p>
      <form id="admin-login-form" class="admin-form">
        <label>
          Email
          <input id="admin-email" type="email" placeholder="btp@gmail.com" required />
        </label>
        <label>
          Password
          <input id="admin-password" type="password" placeholder="********" required />
        </label>
        <button class="btn" type="submit">Login</button>
      </form>
      <p id="admin-login-message" class="muted"></p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container"></div>
  </footer>

  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/common.js"></script>
  <script src="../assets/js/admin-login.js"></script>
</body>
</html>
